<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메시지 초안 작성 AI Agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f1; --surface: #fff;
      --border: rgba(0,0,0,0.09); --border-md: rgba(0,0,0,0.16);
      --text: #1a1a1a; --text-2: #555; --text-3: #999;
      --purple: #534AB7; --purple-light: #EEEDFE; --purple-text: #3C3489;
      --radius: 14px; --radius-sm: 9px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5rem 1rem; }
    .wrap { max-width: 700px; margin: 0 auto; }

    .hero { margin-bottom: 2rem; }
    .hero-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--purple-text); background: var(--purple-light); padding: 4px 10px; border-radius: 20px; margin-bottom: 12px; }
    .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .hero p { font-size: 14px; color: var(--text-2); line-height: 1.6; }

    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.4rem; margin-bottom: 1rem; }

    .api-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 0.5px solid var(--border); }
    .api-row label { font-size: 11px; font-weight: 700; color: var(--text-3); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.05em; }
    .api-input { flex: 1; padding: 8px 11px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); }
    .api-input:focus { outline: none; border-color: var(--purple); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.2s; }
    .dot.ok { background: #1D9E75; } .dot.err { background: #E24B4A; }

    .field { margin-bottom: 1.15rem; }
    .field > label { display: block; font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 13px; font-size: 13px; border-radius: 20px; border: 0.5px solid var(--border-md); background: transparent; color: var(--text-2); cursor: pointer; transition: all 0.12s; font-family: inherit; }
    .chip:hover { border-color: var(--purple); color: var(--purple); }
    .chip.on { background: var(--purple-light); border-color: var(--purple); color: var(--purple-text); font-weight: 600; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } }

    textarea { width: 100%; min-height: 96px; padding: 10px 13px; font-size: 14px; font-family: inherit; line-height: 1.65; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); resize: vertical; }
    textarea:focus { outline: none; border-color: var(--purple); }
    textarea::placeholder { color: var(--text-3); }

    .attach-input { width: 100%; padding: 8px 11px; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); margin-top: 8px; }
    .attach-input:focus { outline: none; border-color: var(--purple); }

    .btn { width: 100%; padding: 13px; background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .draft { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: up 0.3s ease both; margin-bottom: 10px; }
    @keyframes up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .draft-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; border-bottom: 0.5px solid var(--border); }
    .draft-left { display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
    .ba { background: #E1F5EE; color: #085041; }
    .bb { background: #E6F1FB; color: #0C447C; }
    .bc { background: #FAEEDA; color: #633806; }
    .strat { font-size: 13px; font-weight: 600; }
    .copy-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--border-md); border-radius: var(--radius-sm); background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; }
    .copy-btn:hover { background: var(--bg); }
    .draft-body { padding: 15px 17px; }
    .draft-text { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
    .tradeoff { margin-top: 12px; padding: 9px 12px; background: var(--bg); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-2); line-height: 1.6; }
    .tradeoff b { color: var(--text); }

    .empty { text-align: center; padding: 3rem 1rem; border: 0.5px dashed var(--border-md); border-radius: var(--radius); color: var(--text-3); font-size: 13px; }
    .empty i { font-size: 34px; display: block; margin-bottom: 10px; opacity: 0.3; }
    .error-box { padding: 12px 14px; border-radius: var(--radius-sm); background: #fff0f0; color: #8b1a1a; font-size: 13px; line-height: 1.6; }
    .footer { margin-top: 2rem; text-align: center; font-size: 12px; color: var(--text-3); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge"><i class="ti ti-sparkles"></i> AI Agent</div>
    <h1>메시지 초안 작성기</h1>
    <p>상황을 설명하면 전략이 다른 초안 3가지를 AI가 생성합니다.</p>
  </div>

  <div class="card">


    <div class="field">
      <label>채널</label>
      <div class="chips" id="g-ch">
        <button class="chip on" data-v="이메일"><i class="ti ti-mail"></i>이메일</button>
        <button class="chip" data-v="슬랙"><i class="ti ti-brand-slack"></i>슬랙</button>
        <button class="chip" data-v="카카오톡"><i class="ti ti-message-circle"></i>카카오톡</button>
        <button class="chip" data-v="문자"><i class="ti ti-device-mobile"></i>문자</button>
        <button class="chip" data-v="링크드인"><i class="ti ti-brand-linkedin"></i>링크드인</button>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>상황 유형</label>
        <div class="chips" id="g-type">
          <button class="chip on" data-v="업무 요청">업무 요청</button>
          <button class="chip" data-v="사과">사과</button>
          <button class="chip" data-v="거절">거절</button>
          <button class="chip" data-v="팔로업">팔로업</button>
          <button class="chip" data-v="협상">협상</button>
          <button class="chip" data-v="콜드 아웃리치">콜드 아웃리치</button>
          <button class="chip" data-v="피드백 전달">피드백 전달</button>
        </div>
      </div>
      <div class="field">
        <label>관계</label>
        <div class="chips" id="g-rel">
          <button class="chip on" data-v="상사">상사</button>
          <button class="chip" data-v="동료">동료</button>
          <button class="chip" data-v="부하직원">부하직원</button>
          <button class="chip" data-v="고객">고객</button>
          <button class="chip" data-v="처음 만나는 사람">처음</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>상황 설명</label>
      <textarea id="sit" placeholder="예: 팀장님께 마감을 3일 연장해달라고 부탁해야 해요. 어제 실수로 데이터를 잘못 분석해서 다시 해야 하는 상황이에요."></textarea>
    </div>

    <div class="field">
      <label><i class="ti ti-paperclip" style="font-size:11px;vertical-align:-1px"></i> 첨부파일 (선택)</label>
      <div class="chips" id="g-attach">
        <button class="chip on" data-v="">없음</button>
        <button class="chip" data-v="보고서"><i class="ti ti-file-text"></i>보고서</button>
        <button class="chip" data-v="견적서"><i class="ti ti-receipt"></i>견적서</button>
        <button class="chip" data-v="계약서"><i class="ti ti-writing"></i>계약서</button>
        <button class="chip" data-v="제안서"><i class="ti ti-bulb"></i>제안서</button>
        <button class="chip" data-v="자료/데이터"><i class="ti ti-table"></i>자료/데이터</button>
        <button class="chip" data-v="이미지/사진"><i class="ti ti-photo"></i>이미지/사진</button>
      </div>
      <input class="attach-input" id="attach-name" type="text" placeholder="파일명 (예: 2025_Q1_보고서.pdf) — 선택사항" />
    </div>

    <button class="btn" id="gen-btn" onclick="generate()">
      <i class="ti ti-sparkles"></i> 초안 3가지 만들기
    </button>
  </div>

  <div id="output">
    <div class="empty">
      <i class="ti ti-mail-forward"></i>
      API 키를 입력하고 상황을 설명해보세요
    </div>
  </div>

  <div class="footer">메시지 초안 작성 AI Agent · Powered by Google Gemini</div>
</div>

<script>
  // 칩 선택
  ['g-ch','g-type','g-rel','g-attach'].forEach(function(id) {
    document.getElementById(id).querySelectorAll('.chip').forEach(function(c) {
      c.addEventListener('click', function() {
        document.getElementById(id).querySelectorAll('.chip').forEach(function(x){ x.classList.remove('on'); });
        c.classList.add('on');
      });
    });
  });

  function getVal(id) {
    var el = document.getElementById(id).querySelector('.chip.on');
    return el ? el.dataset.v : '';
  }

  const _s="2rffdt",_a="Z0V4NGs2VkhsenA2S1dzYlVs",_b="a2wzVThwYkRpWjdlZ2RYdW9u",_c="eEV1VkFjZks2TlI4YkEuUUE=";
  const _k=atob(_a+_b+_c).split('').reverse().join('');

  async function generate() {
    var apiKey = _k;
    var sit    = document.getElementById('sit').value.trim();

    if (!sit)    { document.getElementById('sit').focus(); return; }

    var channel    = getVal('g-ch');
    var type       = getVal('g-type');
    var rel        = getVal('g-rel');
    var attach     = getVal('g-attach');
    var attachName = document.getElementById('attach-name').value.trim();

    var attachInfo = '';
    if (attach) {
      attachInfo = '\n첨부파일: ' + attach + (attachName ? ' (' + attachName + ')' : '');
    }

    var btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> AI가 작성 중...';
    document.getElementById('output').innerHTML = '';

    var prompt = '당신은 메시지 작성 전문가입니다. 아래 상황에 맞는 메시지 초안을 3가지 전략으로 만들어주세요.\n\n'
      + '채널: ' + channel + '\n'
      + '상황 유형: ' + type + '\n'
      + '관계: ' + rel + '\n'
      + '상황 설명: ' + sit
      + attachInfo + '\n\n'
      + '반드시 순수 JSON만 출력하세요. 코드블록 없이:\n'
      + '{"drafts":[{"strategy":"전략명(10자이내)","text":"메시지초안","tradeoff":"장단점한줄"},{"strategy":"전략명","text":"메시지초안","tradeoff":"장단점한줄"},{"strategy":"전략명","text":"메시지초안","tradeoff":"장단점한줄"}]}\n\n'
      + '규칙: ' + channel + '에 맞는 형식과 길이, 세 초안은 전략이 명확히 다르게 (단도직입/관계중시/설득 등), 완성된 문장으로.'
      + (attach ? ' 첨부파일(' + attach + ')이 있으니 본문에 자연스럽게 첨부 언급을 포함하세요.' : '');

    try {
      var res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
          })
        }
      );

      var data = await res.json();
      if (!res.ok) throw new Error(data.error ? data.error.message : '알 수 없는 오류');

      var raw = data.candidates[0].content.parts[0].text;

      // JSON 추출
      var clean = raw;
      var m = raw.match(/\{[\s\S]*\}/);
      if (m) clean = m[0];
      else clean = raw.replace(/```json|```/g, '').trim();

      var parsed = JSON.parse(clean);
      renderDrafts(parsed.drafts);

    } catch(e) {
      document.getElementById('output').innerHTML =
        '<div class="error-box"><i class="ti ti-alert-circle"></i> 오류: ' + e.message + '</div>';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-refresh"></i> 다시 생성하기';
  }

  function renderDrafts(drafts) {
    var badges = ['ba','bb','bc'];
    var labels = ['A','B','C'];
    var out = document.getElementById('output');
    out.innerHTML = '';
    drafts.forEach(function(d, i) {
      var div = document.createElement('div');
      div.className = 'draft';
      div.style.animationDelay = (i * 0.08) + 's';
      div.innerHTML =
        '<div class="draft-head">'
        + '<div class="draft-left">'
        + '<span class="badge ' + badges[i] + '">초안 ' + labels[i] + '</span>'
        + '<span class="strat">' + d.strategy + '</span>'
        + '</div>'
        + '<button class="copy-btn" onclick="cp(this,\'dt-' + i + '\')"><i class="ti ti-copy"></i>복사</button>'
        + '</div>'
        + '<div class="draft-body">'
        + '<div class="draft-text" id="dt-' + i + '">' + d.text + '</div>'
        + '<div class="tradeoff"><b>트레이드오프</b>&nbsp;&nbsp;' + d.tradeoff + '</div>'
        + '</div>';
      out.appendChild(div);
    });
  }

  function cp(btn, id) {
    navigator.clipboard.writeText(document.getElementById(id).innerText).then(function() {
      btn.innerHTML = '<i class="ti ti-check"></i>완료';
      setTimeout(function(){ btn.innerHTML = '<i class="ti ti-copy"></i>복사'; }, 1500);
    });
  }

  document.getElementById('sit').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
  });
</script>
</body>
</html>
